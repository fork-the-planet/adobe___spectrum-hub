name: Update Component Properties

on:
  # Re-add the daily schedule after @adobe/spectrum-wc publishes custom-elements.json.
  # schedule:
  #   - cron: '0 6 * * *' # Daily at 6am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-properties:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract component properties from published CEM
        run: node deps/swc/extract-cem-components.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/swc/data/
          git diff --staged --quiet || git commit -m "chore: update component properties from CEM"
          git push
