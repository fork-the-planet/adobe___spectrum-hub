name: Update React Spectrum Component Properties

on:
  schedule:
    - cron: '0 7 * * *' # Daily at 7am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-properties:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Discover published S2 components
        run: node deps/rsp/discover-components.js

      - name: Extract base shared properties
        run: node deps/rsp/extract-base-props.js

      - name: Extract component properties
        run: node deps/rsp/extract-props.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/rsp/components.json deps/rsp/data/
          git diff --staged --quiet || git commit -m "chore: update React Spectrum component properties"
          git push
