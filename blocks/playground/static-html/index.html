<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Component Playground</title>
  <!-- swc.css from a RAW CDN (not esm.sh): it relatively `@import`s tokens.css,
       which only resolves when the file is served verbatim. esm.sh would rewrite
       the import and break it. -->
  <link rel="stylesheet" href="https://unpkg.com/@adobe/spectrum-wc@0.3.0/dist/swc.css" />
  <script type="module" src="../../../deps/swc/playground/theme-sync.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1rem;
      font-family: sans-serif;
      color-scheme: light dark;
      background: light-dark(#fff, #000);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      min-height: 100vh;
    }

    #mount {
      display: contents;
    }

    /* Image viewer — ios / android */
    #image-viewer {
      display: none;
    }

    #image-viewer.active {
      display: block;
    }

    #image-viewer img {
      max-width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body class="swc-theme swc-theme--sizeM swc-theme--light">
  <div id="mount"></div>
  <div id="image-viewer" aria-label="Component preview image">
    <img id="preview-image" src="" alt="" />
  </div>

  <script type="module">
    import { defineSwc } from '../../../deps/swc/playground/define-swc.js';
    import { listenForPropUpdates } from '../../../deps/swc/playground/prop-listener.js';

    const mount = document.getElementById('mount');

    const params = new URLSearchParams(window.location.search);
    const component = params.get('component')?.toLowerCase().trim();
    const implementation = params.get('implementation')?.toLowerCase().trim();

    function showError(message) {
      document.body.textContent = message;
    }

    if (!component || !implementation) {
      showError('Missing required query params: component, implementation');
      throw new Error('Missing required query params');
    }

    // `component` drives a relative fetch for the SWC fragment, so keep it to the
    // safe custom-element charset — no slashes, dots, or traversal.
    if (!/^[a-z0-9-]+$/.test(component)) {
      showError(`Invalid component name: ${component}`);
      throw new Error(`Invalid component name: ${component}`);
    }

    // --- SWC ----------------------------------------------------------------

    // Applies one prop-update message to a live custom element. Shared by the
    // prop listener below; the (property, attribute, value) contract is defined
    // by the block (see shared/prop-listener.js).
    function applySwcProp(el, { property, attribute, value }) {
      if (property === 'text' || property === 'label' || property === 'children') {
        // NOTE: a blind textContent assignment clobbers slotted children, so no
        // composite (tabs/accordion/…) currently authors a text control. When
        // the "inject textfield input into a text slot" feature lands, this will
        // need to target a specific text slot instead.
        el.textContent = value;
        return;
      }

      if (!attribute) { return; }

      if (value === false || value === null || value === undefined) {
        el.removeAttribute(attribute);
      } else if (value === true) {
        el.setAttribute(attribute, '');
      } else {
        el.setAttribute(attribute, value);
      }
    }

    // Per-component markup lives in a sibling fragment file (e.g. button.html)
    // that holds ONLY the web-component HTML — no <head>, <script>, or shell
    // boilerplate. This shell fetches it, injects it, registers whatever swc-*
    // tags it contains (families included), and drives prop updates against the
    // fragment's root element. Adding a component is a one-file markup edit.
    async function initSwc() {
      let markup;
      try {
        const resp = await fetch(`./${component}.html`);
        if (!resp.ok) { throw new Error(`HTTP ${resp.status}`); }
        markup = await resp.text();
      } catch (err) {
        showError(`Failed to load preview markup for ${component} (${err.message})`);
        throw err;
      }

      mount.innerHTML = markup;

      const root = mount.firstElementChild;
      if (!root) {
        showError(`Preview markup for ${component} has no root element`);
        throw new Error('Empty preview fragment');
      }
      const rootTag = root.localName;

      // Register every swc-* tag the fragment uses. Families (tabs -> tab,
      // tab-panel) are discovered from the markup itself, so there is no
      // per-page define list to maintain. The root's tag is required — surface
      // its failure — while secondary tags degrade softly (the root still
      // renders), matching the old per-component shells.
      const tags = [...new Set(
        [...mount.querySelectorAll('*')]
          .map((node) => node.localName)
          .filter((name) => name.startsWith('swc-')),
      )];

      await Promise.all(tags.map(async (tag) => {
        try {
          await defineSwc(tag.slice(4));
        } catch (err) {
          if (tag === rootTag) {
            showError(`Failed to load SWC component: ${rootTag}`);
            throw err;
          }
          // Secondary family member — the root shell still renders without it.
        }
      }));

      // Some components (e.g. tooltip) only reveal via the Popover API, not the
      // `open` attribute alone. Markup can't call showPopover(), so do it
      // generically for any popover-capable element the fragment marked open.
      mount.querySelectorAll('[open]').forEach((el) => {
        if (typeof el.showPopover === 'function') {
          try { el.showPopover(); } catch { /* already open or unsupported */ }
        }
      });

      listenForPropUpdates((update) => applySwcProp(root, update));
    }

    // --- RSP ----------------------------------------------------------------

    // Loaded from esm.sh at preview time (no local vendoring, unlike SWC).
    // The React version is resolved from @react-spectrum/s2's own peerDependencies
    // at runtime and used to pin every react/react-dom import via esm.sh's `?deps=`
    // param, so the app's React copy and RSP's internal React copy are the same
    // module instance. @react-spectrum/s2 currently peers on a React 19 RC — this
    // preview requires network access to esm.sh and breaks if esm.sh is unreachable
    // or a future S2 release changes its export/Provider shape.
    async function initRsp() {
      const PKG = '@react-spectrum/s2';
      const exportName = component.split('-').map((p) => p.charAt(0).toUpperCase() + p.slice(1)).join('');

      try {
        const pkg = await (await fetch(`https://esm.sh/${PKG}/package.json`)).json();
        const reactVersion = (pkg.peerDependencies?.react ?? '19').replace(/^[^0-9]*/, '');
        const deps = `react@${reactVersion},react-dom@${reactVersion}`;

        // @react-spectrum/s2's unbundled output has `import "./Foo.css.mjs"`
        // side-effect imports that esm.sh redirects to real .css files, which a
        // bare browser `import()` refuses to load as a module (wrong MIME type) —
        // it fails with an opaque "Failed to fetch dynamically imported module"
        // and no further detail. `?bundle` drops those CSS side-effect imports
        // from the JS graph so it can load at all, but doesn't inline the styles —
        // so the actual visual CSS is loaded separately as real <link> stylesheets
        // below (page.css for shared tokens/reset, plus this component's own
        // generated class rules).
        const [{ createElement }, { createRoot }, RSP] = await Promise.all([
          import(`https://esm.sh/react@${reactVersion}`),
          import(`https://esm.sh/react-dom@${reactVersion}/client`),
          import(`https://esm.sh/${PKG}@${pkg.version}?bundle&exports=${exportName},Provider&deps=${deps}`),
        ]);

        [`https://esm.sh/${PKG}@${pkg.version}/page.css`,
          `https://esm.sh/${PKG}@${pkg.version}/dist/private/${exportName}.css`].forEach((href) => {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        });

        const Component = RSP[exportName];
        if (!Component) throw new Error(`No RSP export named "${exportName}"`);

        const root = createRoot(mount);
        // Default label so the preview isn't a blank button before the parent's
        // prop-update messages arrive (or if "children" isn't authored at all).
        const currentProps = { children: component.charAt(0).toUpperCase() + component.slice(1) };

        function render() {
          root.render(createElement(RSP.Provider, { colorScheme: 'light', background: 'base' },
            createElement(Component, currentProps)));
        }

        render();

        listenForPropUpdates(({ property, value }) => {
          currentProps[property] = value;
          render();
        });
      } catch (err) {
        showError(`Failed to load RSP component: ${exportName} (${err.message})`);
      }
    }

    // --- iOS / Android image viewer -----------------------------------------

    function buildImagePath(props) {
      const sorted = Object.entries(props)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([k, v]) => `${k}-${v}`)
        .join('--');
      const base = `/playground/${component}/images/${implementation}`;
      return sorted ? `${base}/${sorted}.png` : `${base}/default.png`;
    }

    function initImageViewer() {
      const viewer = document.getElementById('image-viewer');
      const img = document.getElementById('preview-image');
      viewer.classList.add('active');

      const currentProps = {};

      function updateImage() {
        const preferred = buildImagePath(currentProps);
        const fallback = `/playground/${component}/images/${implementation}/default.png`;

        img.onerror = () => { img.src = fallback; img.onerror = null; };
        img.src = preferred;
        img.alt = `${component} — ${Object.entries(currentProps).map(([k, v]) => `${k}: ${v}`).join(', ')}`;
      }

      updateImage();

      listenForPropUpdates(({ property, value }) => {
        currentProps[property] = value;
        updateImage();
      });
    }

    // --- Route ---------------------------------------------------------------

    if (implementation === 'swc') {
      await initSwc();
    } else if (implementation === 'rsp') {
      await initRsp();
    } else if (implementation === 'ios' || implementation === 'android') {
      initImageViewer();
    } else {
      showError(`Unsupported implementation: ${implementation}`);
    }
  </script>
</body>
</html>
