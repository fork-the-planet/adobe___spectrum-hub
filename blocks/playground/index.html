<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Component Playground</title>
  <link rel="stylesheet" href="./preview-shell.css" />
  <!-- swc.css is loaded conditionally by the SWC shell (deps/swc/playground/
   index.html), not here. That would silently shrink every rem-sized RSP/S2
   dimension if it were always present. -->
  <link rel="stylesheet" href="../../deps/shared/playground/shared-fonts.css" />
  <script type="module" src="../../deps/shared/playground/theme-sync.js"></script>
</head>
<body class="swc-theme swc-theme--sizeM swc-theme--light">
  <div id="mount"></div>
  <div id="image-viewer" aria-label="Component preview image">
    <img id="preview-image" src="" alt="" />
  </div>

  <script type="module">
    import { listenForPropUpdates, notifyPreviewReady } from '../../deps/shared/playground/prop-listener.js';
    import { showError, resolvePreviewParams } from './preview-params.js';

    const { component, implementation } = resolvePreviewParams();

    // --- iOS / Android image viewer -----------------------------------------

    function buildImagePath(props) {
      const sorted = Object.entries(props)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([k, v]) => `${k}-${v}`)
        .join('--');
      const base = `/playground/${component}/images/${implementation}`;
      return sorted ? `${base}/${sorted}.png` : `${base}/default.png`;
    }

    function initImageViewer() {
      const viewer = document.getElementById('image-viewer');
      const img = document.getElementById('preview-image');
      viewer.classList.add('active');

      const currentProps = {};

      function updateImage() {
        const preferred = buildImagePath(currentProps);
        const fallback = `/playground/${component}/images/${implementation}/default.png`;

        img.onerror = () => { img.src = fallback; img.onerror = null; };
        img.src = preferred;
        img.alt = `${component} — ${Object.entries(currentProps).map(([k, v]) => `${k}: ${v}`).join(', ')}`;
      }

      updateImage();

      listenForPropUpdates(({ property, value }) => {
        currentProps[property] = value;
        updateImage();
      });
      notifyPreviewReady();
    }

    // --- Route ---------------------------------------------------------------
    // RSP and SWC now have their own dedicated shells (deps/rsp/playground/
    // index.html, deps/swc/playground/index.html) — blocks/playground.js picks
    // between the three based on `implementation` (see resolveComponentMeta).
    // This generic shell only ever handles ios/android, plus the same
    // "unsupported implementation" fallback every shell has always had.

    if (implementation === 'ios' || implementation === 'android') {
      initImageViewer();
    } else {
      showError(`Unsupported implementation: ${implementation}`);
    }
  </script>
</body>
</html>
