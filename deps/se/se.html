<!DOCTYPE html>
<html>

<head>
  <title>Spectrum Edge - Form Elements</title>
  <meta name="description" content="Spectrum for Edge Delivery semantic content."/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:,">
  <script type="importmap">
    { "imports": { "lit": "/deps/lit/dist/index.js" } }
  </script>
  <link rel="stylesheet" href="/styles/styles.css">
  <style>
    body {
      display: none;
      &.se-loaded {
        display: unset;
      }
    }

    form {
      max-width: 600px;
      margin-inline: auto;
    }

    form > div {
      margin-block: var(--s2-spacing-400);
    }

    .form-actions, .dialog-actions {
      display: flex;
      justify-content: end;
      flex-wrap: wrap;
      gap: var(--s2-spacing-200);
      margin-top: var(--s2-spacing-400);
    }
  </style>
  <script src="/scripts/ak.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <script src="/deps/se/se.js" type="module"></script>
</head>

<body>
  <header></header>
  <template>
    <se-dialog heading="Modal" closedby="any">
      <div>
        <se-input type="text" name="my-range" label="Textfield" placeholder="Anything you want..."></se-input>
      </div>
      <div class="dialog-actions">
        <se-button class="secondary" commandfor="se-dialog-demo" command="close">Cancel</se-button>
        <se-button>Submit</se-button>
      </div>
    </se-dialog>
  </template>
  <main>
    <form>
        <div>
          <se-select label="Select (picker)" name="hello">
            <option>Doc</option>
            <option>Grumpy</option>
            <option>Happy</option>
            <option>Sleepy</option>
            <option>Bashful</option>
            <option>Sneezy</option>
            <option>Dopey</option>
          </se-select>
        </div>
        <div>
          <se-input type="range" name="my-range" label="Range"></se-input>
        </div>
        <div>
          <se-input type="datetime-local" name="my-range" label="Date / Time"></se-input>
        </div>
        <div>
          <se-input type="text" name="my-text" label="Textfield" placeholder="Fill me out"></se-input>
        </div>
        <div>
          <se-textarea name="my-area" label="Textarea" placeholder="Fill me out" rows="5" cols="40"></se-textarea>
        </div>
        <div>
          <se-checkbox name="my-checkbox" label="Checkbox">Tiny checkbox</se-checkbox>
        </div>
        <div>
          <se-switch name="my-switch">Switch</se-switch>
        </div>
        <div>
          <se-segmentedcontrol>
            <fieldset>
              <legend>Segmented Control</legend>
              <label>
                <input type="radio" name="view" value="map" checked>
                <span>Map</span>
              </label>
              <label>
                <input type="radio" name="view" value="list">
                <span>List</span>
              </label>
              <label>
                <input type="radio" name="view" value="grid">
                <span>Grid</span>
              </label>
            </fieldset>
          </se-segmentedcontrol>
        </div>
        <div class="form-actions">
          <se-button class="negative">Destroy</se-button>
          <se-button>Save outline</se-button>
          <se-button class="secondary">Secondary</se-button>
          <se-button class="primary">Primary</se-button>
          <se-button class="primary outline">Primary outline</se-button>
          <se-button class="open-modal">Open modal</se-button>
        </div>
      </form>
  </main>
  <footer></footer>
  <script>
    const open = document.querySelector('.open-modal');
    open.addEventListener('click', () => {
      const dialog = document.querySelector('se-dialog');
      if (dialog) {
        dialog.showModal();
        return;
      }
      const temp = document.querySelector('template');
      document.body.append(temp.content);
    });
  </script>
</body>

</html>
